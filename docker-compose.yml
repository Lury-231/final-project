version: '3.8'

services:
  # Personal Website
  website:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: personal-website
    ports:
      - "8080:80"
    restart: unless-stopped
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Todo Application (todorealm)
  todo-app:
    image: ghcr.io/todor愁/todorealm:latest
    container_name: todo-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DB_TYPE=sqlite
      - DB_PATH=/app/data/todos.db
    volumes:
      - todo-data:/app/data
    restart: unless-stopped
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Alternative Todo App (Vika Todo)
  # Uncomment the following if you prefer a simpler todo app
  # todo-vika:
  #   image: vikadata/vika:latest
  #   container_name: todo-vika
  #   ports:
  #     - "3000:3000"
  #   restart: unless-stopped
  #   networks:
  #     - app-network

networks:
  app-network:
    driver: bridge

volumes:
  todo-data:
    driver: local
