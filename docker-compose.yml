version: '3.8'

services:
  # Personal Website
  website:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: personal-website
    ports:
      - "8080:80"
    restart: unless-stopped
    networks:
      - app-network

  # Todo Application (todo list)
  todo-app:
    image: amruthpillai/reactive-todo:latest
    container_name: todo-app
    ports:
      - "3000:3000"
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
